name: Air Monitor Bot

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - uses: browser-actions/setup-chrome@v1

      - run: pip install selenium webdriver-manager

      - run: python scraper.py
