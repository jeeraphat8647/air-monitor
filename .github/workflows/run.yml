name: Air Monitor Bot

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4   # ✅ อัปเดต

      - name: Setup Python
        uses: actions/setup-python@v5   # ✅ อัปเดต
        with:
          python-version: "3.12"

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v2   # ✅ อัปเดต

      - name: Install dependencies
        run: pip install selenium webdriver-manager

      - name: Run scraper
        run: python scraper.py
